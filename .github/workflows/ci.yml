name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[full]
          pip install pytest pytest-asyncio ruff

      - name: Lint with ruff
        run: |
          ruff check src/ollamatoolkit/
          ruff format --check src/ollamatoolkit/

      - name: Run tests
        run: |
          pytest tests/test_comprehensive.py tests/test_config.py tests/test_types.py tests/test_client.py tests/test_connector.py tests/test_client_openai_compat.py tests/test_client_stream_events.py -v --tb=short
